<!DOCTYPE html>
<html lang="fr" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Munawwirus-Suduur - Kër Serigne Touba Thiaroye Azur</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Maven Pro', 'sans-serif'],
            },
            colors: {
              emerald: {
                850: '#065f46', 
                950: '#022c22',
              },
              amber: {
                350: '#fbbf24', 
                450: '#f59e0b', 
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.6s ease-out forwards',
              'shimmer': 'shimmer 3s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-150%) skewX(-15deg)' },
                '50%, 100%': { transform: 'translateX(150%) skewX(-15deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* --- GLOBAL RESET & SCROLL HANDLING --- */
      html, body {
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
        -webkit-font-smoothing: antialiased;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc; /* Light default */
        color: #0f172a;
        transition: background-color 0.4s ease, color 0.4s ease;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Dark Mode Overrides */
      html.dark body {
        background-color: #022c22; /* Deep Emerald/Slate */
        color: #f1f5f9;
      }

      .font-logo {
        font-family: 'Maven Pro', sans-serif;
      }
      
      /* --- INPUT STYLES (High Contrast) --- */
      input, select, textarea {
        color: #0f172a !important; /* Always dark text on light bg inputs */
        background-color: #ffffff !important;
        border: 1px solid #cbd5e1;
        transition: all 0.3s ease;
      }

      /* Dark Mode Inputs */
      html.dark input, html.dark select, html.dark textarea {
        color: #ffffff !important;
        background-color: rgba(15, 23, 42, 0.8) !important; /* Dark Slate background */
        border: 1px solid rgba(255,255,255,0.15);
      }
      
      input:focus, select:focus, textarea:focus {
        border-color: #10b981 !important;
        outline: none;
        box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
      }
      
      /* Autofill Reset - Crucial for visibility */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #ffffff inset !important;
        -webkit-text-fill-color: #0f172a !important;
        caret-color: #0f172a;
      }

      html.dark input:-webkit-autofill,
      html.dark input:-webkit-autofill:hover, 
      html.dark input:-webkit-autofill:focus, 
      html.dark input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #0f172a inset !important;
        -webkit-text-fill-color: #ffffff !important;
        caret-color: #ffffff;
      }

      /* Glassmorphism Utilities */
      .glass-nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      html.dark .glass-nav {
        background: rgba(2, 44, 34, 0.75); /* Dark Emerald Translucent */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
      }

      html.dark .glass-card {
        background: rgba(6, 95, 70, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #059669; 
      }
    </style>

{

  }
}
</script>
